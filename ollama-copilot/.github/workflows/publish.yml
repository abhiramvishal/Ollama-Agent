# Build and publish ClawPilot to the VS Code Marketplace.
# Trigger: push a version tag (e.g. v1.0.1) or create a GitHub Release.
# Required: Add VSCE_PAT secret (Azure DevOps PAT with Marketplace publish scope).

name: Build and Publish Extension

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run bundle:prod

      - name: Package (vsix)
        run: npx @vscode/vsce package --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawpilot-vsix
          path: '*.vsix'

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Only publish on tag push or release; skip for manual workflow_dispatch
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    steps:
      - name: Download vsix
        uses: actions/download-artifact@v4
        with:
          name: clawpilot-vsix

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath '*.vsix' -p ${{ secrets.VSCE_PAT }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
