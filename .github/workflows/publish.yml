# Build and publish ClawPilot (runs from repo root when extension is in ollama-copilot/).
name: Build and Publish Extension

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_to_marketplace:
        description: 'Publish to VS Code Marketplace (only for manual run)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ollama-copilot
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ollama-copilot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run bundle:prod

      - name: Package (vsix)
        run: npx @vscode/vsce package --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawpilot-vsix
          path: ollama-copilot/*.vsix

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_to_marketplace == true)
    steps:
      - name: Download vsix
        uses: actions/download-artifact@v4
        with:
          name: clawpilot-vsix

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath '*.vsix' -p ${{ secrets.VSCE_PAT }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
