# CI: build and package the extension (runs from repo root when extension is in ollama-copilot/).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ollama-copilot
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ollama-copilot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run bundle:prod

      - name: Package vsix
        run: npx @vscode/vsce package --no-dependencies
